name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Tests d'intégration
  # ─────────────────────────────────────────
  integration-tests:
    name: 🧪 Tests d'intégration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Démarrage de l'API Flask en arrière-plan
        run: |
          python app/app.py &
          echo "Attente que Flask démarre..."
          sleep 5
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:5000/

      - name: Exécution des tests d'intégration
        env:
          API_BASE_URL: http://localhost:5000
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2 : Build et Push de l'image Docker
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: integration-tests
    # Ne s'exécute que sur push vers main (pas sur les PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_url: ${{ steps.image_url.outputs.url }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build et Push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Définition de l'URL de l'image
        id: image_url
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "url=${IMAGE,,}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────
  # JOB 3 : Déploiement Terraform sur Render
  # ─────────────────────────────────────────
  terraform-deploy:
    name: 🚀 Déploiement Terraform
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        env:
          TF_VAR_render_api_key: ${{ secrets.RENDER_API_KEY }}
          TF_VAR_render_owner_id: ${{ secrets.RENDER_OWNER_ID }}
          TF_VAR_image_url: ${{ needs.build-and-push.outputs.image_url }}
          TF_VAR_github_username: ${{ github.actor }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        env:
          TF_VAR_render_api_key: ${{ secrets.RENDER_API_KEY }}
          TF_VAR_render_owner_id: ${{ secrets.RENDER_OWNER_ID }}
          TF_VAR_image_url: ${{ needs.build-and-push.outputs.image_url }}
          TF_VAR_github_username: ${{ github.actor }}
        run: terraform apply -auto-approve tfplan